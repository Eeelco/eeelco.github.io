---
layout: default
---

<div class="home">
    <div class="row">
        {% for item in site.data.navigation %}
        <div class="col-6 col-sm-4">
            <div class="card bg-light mb-3" >
                <a href="{{ item.url }}"><img class="img-responsive" src="{{ item.img }}" style="width: 100%;"></a>
                <h3 class="card-title text-center"><a href ="{{ item.url }}" style="color: inherit;">{{ item.title }}</a></h3>
                <div class="card-body">
                    <a href ="{{ item.url }}" style="color: inherit;">{{ item.desc }}</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
